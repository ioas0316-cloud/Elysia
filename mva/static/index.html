<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive CAD MVA</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-container { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        input[type="text"] { background: #333; border: 1px solid #555; color: white; padding: 5px; }
        button { background: #555; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        button:hover { background: #777; }
        #equation-display { margin-top: 10px; font-family: monospace; color: #0f0; }

        .control-panel {
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-top: 15px;
            width: 250px;
        }
        .control-group { margin-bottom: 10px; }
        .control-group label { display: inline-block; width: 60px; color: #aaa; font-size: 0.9em; }
        .control-group input[type="range"] { width: 120px; vertical-align: middle; }
        .control-group span { display: inline-block; width: 40px; text-align: right; font-family: monospace; color: #fff; font-size: 0.9em; }
        h3 { margin-top: 0; color: #0f0; font-size: 1.1em; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .spike-effect { animation: flash 0.5s; }
        @keyframes flash {
            0% { background-color: rgba(0, 255, 0, 0.5); }
            100% { background-color: transparent; }
        }
</style>
</head>
<body>
    <div id="ui-container">
        <h2>Cognitive CAD</h2>
        <div>
            <input type="text" id="wordInput" placeholder="단어 입력 (예: 하늘, 바다, 고래)" style="width: 200px;">
            <button onclick="submitWords()">입력/투영</button>
        </div>
        <div style="margin-top: 10px;">
            <button onclick="autoAlign()">자동 공명 찾기 (Auto Align)</button>
        </div>
        <div id="equation-display">수식: 대기 중...</div>

        <div class="control-panel">
            <h3>조이스틱 (관측축 제어)</h3>
            <div class="control-group">
                <label>Q_x</label>
                <input type="range" id="qxSlider" min="-1" max="1" step="0.01" value="0">
                <span id="qxVal">0.00</span>
            </div>
            <div class="control-group">
                <label>Q_y</label>
                <input type="range" id="qySlider" min="-1" max="1" step="0.01" value="0">
                <span id="qyVal">0.00</span>
            </div>
            <div class="control-group">
                <label>Q_z</label>
                <input type="range" id="qzSlider" min="-1" max="1" step="0.01" value="0">
                <span id="qzVal">0.00</span>
            </div>
            <div class="control-group">
                <label>Q_w</label>
                <input type="range" id="qwSlider" min="-1" max="1" step="0.01" value="1">
                <span id="qwVal">1.00</span>
            </div>
        </div>

        <div class="control-panel">
            <h3>시간축 제어 (틱레이트)</h3>
            <div class="control-group">
                <label>속도</label>
                <input type="range" id="tickRateSlider" min="-1" max="3" step="0.1" value="1">
                <span id="tickRateVal">1.0</span>
            </div>
            <div class="control-group">
                <label>수동 시간</label>
                <input type="range" id="manualTimeSlider" min="0" max="100" step="0.1" value="0">
                <span id="manualTimeVal">0.0</span>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <a href="/static/roadmap.html" style="color: #0ff; text-decoration: underline; font-size: 0.9em;">[로드맵 및 통합 전략 문서 보기]</a>
        </div>
    </div>
    <div id="canvas-container"></div>

    <!-- Three.js (via CDN for MVA) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="/static/app.js"></script>
</body>
</html>
