<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysia: Ternary Dipole NPC Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c16;
            --card-bg: rgba(20, 22, 45, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --font-color: #e2e8f0;
            --color-attr: #ffd700; /* Gold */
            --color-rep: #ff3b30;  /* Crimson Red */
            --color-neu: #00f0ff;  /* Neon Cyan/Teal */
            --glow-attr: 0 0 15px rgba(255, 215, 0, 0.5);
            --glow-rep: 0 0 15px rgba(255, 59, 48, 0.5);
            --glow-neu: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(122, 74, 221, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 240, 255, 0.1) 0px, transparent 50%);
            color: var(--font-color);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f0ff, #7a4add, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.95rem;
            color: #8a8db5;
            font-weight: 300;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .visual-card {
            align-items: center;
            justify-content: center;
            min-height: 450px;
        }

        canvas {
            background: rgba(10, 11, 24, 0.8);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            max-width: 100%;
        }

        .controls-card {
            justify-content: space-between;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #b5b7da;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .slider-wrapper {
            margin-bottom: 15px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .slider-label span.attr { color: var(--color-attr); text-shadow: var(--glow-attr); }
        .slider-label span.rep { color: var(--color-rep); text-shadow: var(--glow-rep); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #25284a;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #attrSlider::-webkit-slider-thumb {
            background: var(--color-attr);
            box-shadow: var(--glow-attr);
        }

        #repSlider::-webkit-slider-thumb {
            background: var(--color-rep);
            box-shadow: var(--glow-rep);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .btn-zone {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .btn-shock {
            background: linear-gradient(45deg, #7a4add, #ff3b30);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3);
        }

        .btn-shock:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 59, 48, 0.5);
        }

        .btn-reset {
            background: #25284a;
            color: #b5b7da;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-reset:hover {
            background: #313564;
            color: white;
        }

        .status-display {
            margin-top: 25px;
            padding: 15px;
            background: rgba(10, 11, 24, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
        }

        .status-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--color-neu);
            text-shadow: var(--glow-neu);
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .cognitive-speech {
            font-size: 0.95rem;
            font-style: italic;
            color: #a0aec0;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .legend {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-attr { background: var(--color-attr); box-shadow: var(--glow-attr); }
        .dot-rep { background: var(--color-rep); box-shadow: var(--glow-rep); }
        .dot-neu { background: var(--color-neu); box-shadow: var(--glow-neu); }
    </style>
</head>
<body>

    <header>
        <h1>Elysia: Ternary Dipole</h1>
        <p>인척력 및 장력기반의 규칙 없는 아날로그 NPC 인지 시뮬레이터</p>
    </header>

    <div class="container">
        <!-- Canvas Visualizer Card -->
        <div class="card visual-card">
            <canvas id="rotorCanvas" width="400" height="400"></canvas>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="dot dot-attr"></div>
                    <span>인력로터 (Attraction +1)</span>
                </div>
                <div class="legend-item">
                    <div class="dot dot-rep"></div>
                    <span>척력로터 (Repulsion -1)</span>
                </div>
                <div class="legend-item">
                    <div class="dot dot-neu"></div>
                    <span>항상성로터 (Neutral 0)</span>
                </div>
            </div>
        </div>

        <!-- Controls Card -->
        <div class="card controls-card">
            <div class="control-group">
                <h3>환경 자극 컨트롤러 (Environment Stimuli)</h3>
                
                <div class="slider-wrapper">
                    <div class="slider-label">
                        <span class="attr">금화 / 먹이 / 친화감 (Attraction Force)</span>
                        <span id="attrVal">0.0</span>
                    </div>
                    <input type="range" id="attrSlider" min="0" max="10" step="0.1" value="0">
                </div>

                <div class="slider-wrapper">
                    <div class="slider-label">
                        <span class="rep">칼 / 늑대 / 위협감 (Repulsion Force)</span>
                        <span id="repVal">0.0</span>
                    </div>
                    <input type="range" id="repSlider" min="0" max="10" step="0.1" value="0">
                </div>

                <div class="btn-zone">
                    <button class="btn-shock" onclick="triggerShock()">돌발 위기격발 (Shock)</button>
                    <button class="btn-reset" onclick="resetSystem()">중립화 (Reset)</button>
                </div>
            </div>

            <div class="status-display">
                <div class="status-text" id="statusText">🧘 [항상성 0] 평정 상태 (Homeostasis)</div>
                <div class="cognitive-speech" id="speechText">"주위가 고요하군. 편안하게 숨을 쉬고 있어."</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('rotorCanvas');
        const ctx = canvas.getContext('2d');

        // Physical system states for the 3 poles
        // 0: Attraction, 1: Repulsion, 2: Neutral
        let x = [0.0, 0.0, 0.0]; // Angles in radians
        let v = [0.0, 0.0, 0.0]; // Angular velocities
        const M = [1.0, 1.0, 1.0]; // Inertia
        const D = [0.15, 0.15, 0.15]; // Damping
        const K = [1.5, 1.5, 1.5]; // Return spring to zero

        // User interactive forces
        let F_attr = 0.0;
        let F_rep = 0.0;

        // Sliders
        const attrSlider = document.getElementById('attrSlider');
        const repSlider = document.getElementById('repSlider');
        const attrVal = document.getElementById('attrVal');
        const repVal = document.getElementById('repVal');
        const statusText = document.getElementById('statusText');
        const speechText = document.getElementById('speechText');

        attrSlider.addEventListener('input', (e) => {
            F_attr = parseFloat(e.target.value);
            attrVal.textContent = F_attr.toFixed(1);
        });

        repSlider.addEventListener('input', (e) => {
            F_rep = parseFloat(e.target.value);
            repVal.textContent = F_rep.toFixed(1);
        });

        function triggerShock() {
            // Apply sudden high velocity to generate chaos
            v[0] = (Math.random() - 0.5) * 15;
            v[1] = (Math.random() - 0.5) * 15;
            v[2] = (Math.random() - 0.5) * 5;
            speechText.textContent = `"윽! 주변 진동이 격렬해지고 있어! 중심을 잃겠다!"`;
        }

        function resetSystem() {
            x = [0, 0, 0];
            v = [0, 0, 0];
            F_attr = 0;
            F_rep = 0;
            attrSlider.value = 0;
            repSlider.value = 0;
            attrVal.textContent = "0.0";
            repVal.textContent = "0.0";
        }

        // Live interpretation of states to NPC speech
        function getSpeech(deg) {
            if (Math.abs(deg) < 15) {
                return `"주위가 고요하군. 항상성이 잘 유지되고 있어."`;
            } else if (deg > 15) {
                if (deg > 45) {
                    return `"저것에 완전히 매료되었어! 당장 더 가까이 다가가고 싶다!"`;
                }
                return `"흥미로운데..? 조심스럽게 호기심이 생기기 시작했어."`;
            } else {
                if (deg < -45) {
                    return `"매우 위험해! 본능적으로 강한 거부감과 공포가 밀려온다!"`;
                }
                return `"약간의 위협이 느껴지는군. 거리를 두고 지켜봐야겠어."`;
            }
        }

        function updatePhysics() {
            const dt = 0.05;

            // Apply interactive forces
            const forces = [F_attr, -F_rep, 0.0];

            // Coupled spring-tensions between rotors: sin(theta_diff)
            const tension_0_1 = 1.5 * Math.sin(x[0] - x[1]);
            const tension_1_2 = 1.0 * Math.sin(x[1] - x[2]);
            const tension_2_0 = 1.0 * Math.sin(x[2] - x[0]);

            // Net forces including coupled tensions
            const net_forces = [
                forces[0] - tension_0_1 + tension_2_0,
                forces[1] + tension_0_1 - tension_1_2,
                forces[2] + tension_1_2 - tension_2_0
            ];

            // Resolve equations of motion: M*a + D*v + K*x = F_net
            for (let i = 0; i < 3; i++) {
                const restoring = -K[i] * x[i];
                const damping = -D[i] * v[i];
                const a = (net_forces[i] + restoring + damping) / M[i];

                v[i] += a * dt;
                x[i] += v[i] * dt;

                // Bind within [-PI, PI]
                if (x[i] > Math.PI) x[i] -= 2 * Math.PI;
                if (x[i] < -Math.PI) x[i] += 2 * Math.PI;
            }

            // Update UI State Texts
            const avgPhase = (x[0] - x[1]) / 2.0;
            const deg = avgPhase * (180 / Math.PI);

            if (Math.abs(deg) < 15) {
                statusText.textContent = "🧘 [항상성 0] 평정 상태 (Homeostasis)";
                statusText.style.color = "var(--color-neu)";
                statusText.style.textShadow = "var(--glow-neu)";
            } else if (deg > 15) {
                statusText.textContent = `❤️ [접근동기 +1] 호기심/친밀 (Attraction: +${deg.toFixed(1)}°)`;
                statusText.style.color = "var(--color-attr)";
                statusText.style.textShadow = "var(--glow-attr)";
            } else {
                statusText.textContent = `🛡️ [회피동기 -1] 공포/경계 (Repulsion: ${deg.toFixed(1)}°)`;
                statusText.style.color = "var(--color-rep)";
                statusText.style.textShadow = "var(--glow-rep)";
            }

            if (v[0] !== 0 && !speechText.textContent.includes("윽!")) {
                speechText.textContent = getSpeech(deg);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 120;

            // Draw Background Circular Grid
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Draw Neutral Axis (Reference 0)
            ctx.beginPath();
            ctx.moveTo(cx - 150, cy);
            ctx.lineTo(cx + 150, cy);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw Spring Tension Lines between rotors
            const px0 = cx + radius * Math.cos(x[0]);
            const py0 = cy + radius * Math.sin(x[0]);
            const px1 = cx + radius * Math.cos(x[1]);
            const py1 = cy + radius * Math.sin(x[1]);
            const px2 = cx + radius * Math.cos(x[2]);
            const py2 = cy + radius * Math.sin(x[2]);

            ctx.beginPath();
            ctx.moveTo(px0, py0);
            ctx.lineTo(px1, py1);
            ctx.lineTo(px2, py2);
            ctx.closePath();
            ctx.strokeStyle = 'rgba(122, 74, 221, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]); // Spring-like dashed style
            ctx.stroke();
            ctx.setLineDash([]); // Reset

            // Draw Rotors (Spinning Nodes)
            const drawRotor = (angle, color, glowColor, label) => {
                const rx = cx + radius * Math.cos(angle);
                const ry = cy + radius * Math.sin(angle);

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = glowColor;

                // Center line of the rotor
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(rx, ry);
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();

                // Spin Node circle
                ctx.beginPath();
                ctx.arc(rx, ry, 10, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();

                // Reset shadow for text
                ctx.shadowBlur = 0;

                // Label Text
                ctx.fillStyle = '#b5b7da';
                ctx.font = 'bold 11px Outfit';
                ctx.fillText(label, rx + 15, ry + 5);
            };

            drawRotor(x[0], 'var(--color-attr)', 'rgba(255, 215, 0, 0.6)', 'ATTRACT (+1)');
            drawRotor(x[1], 'var(--color-rep)', 'rgba(255, 59, 48, 0.6)', 'REPEL (-1)');
            drawRotor(x[2], 'var(--color-neu)', 'rgba(0, 240, 255, 0.6)', 'NEUTRAL (0)');

            // Draw Center Pivot
            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#7a4add';
            ctx.fill();
        }

        function loop() {
            updatePhysics();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
