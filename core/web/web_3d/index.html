<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elysia 4D Hyper-Dimensional Universe</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000005; }
        canvas { display: block; }
        #ui { 
            position: absolute; 
            top: 15px; left: 15px; 
            color: rgba(220, 240, 255, 0.9); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: rgba(5, 5, 10, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(150, 200, 255, 0.4);
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.2);
        }
        .title { font-size: 1.3em; font-weight: bold; margin-bottom: 5px; color: #a0d8ff; text-shadow: 0 0 10px #00aaff; }
        .joy-val { font-size: 1.5em; font-family: monospace; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .beacon-label {
            position: absolute;
            color: #ffd700;
            font-weight: bold;
            font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
            font-size: 13px;
            pointer-events: none;
            text-shadow: 0px 0px 8px #ff00ff, 0px 0px 3px #000;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="title">4D Tesseract Semantic Space</div>
        <div>Subjective Hyper-Time Joy: <br><span class="joy-val" id="joy">0.0000</span></div>
        <div style="margin-top: 10px; font-size: 0.8em; color: #88a;">Projecting 4D Quaternions to 3D.</div>
    </div>
    
    <div id="label-container" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>
    <div id="controls" style="position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #ff00ff; box-shadow: 0 0 10px #ff00ff; z-index: 100;">
        <h3 style="margin-top: 0; color: #ff00ff;">🌌 Spacetime Control</h3>
        <input type="range" id="timeSlider" min="-499" max="0" value="0" style="width: 300px;"><br>
        <span id="timeValue" style="font-weight:bold;">[ T = Present ]</span>
        <hr style="border-color: #333;">
        <label><input type="checkbox" id="showDots" checked> Show Dots (Particles)</label><br>
        <label><input type="checkbox" id="showLines" checked> Show Lines (Attraction)</label><br>
        <label><input type="checkbox" id="showFaces" checked> Show Faces (Tension Volume)</label>
    </div>

    <!-- 여백 관측소 (Observatory of the Void) -->
    <div id="observatory" style="position: absolute; top: 20px; right: 20px; width: 350px; height: 500px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #00ffff; box-shadow: 0 0 10px #00ffff; overflow-y: auto; font-family: monospace; font-size: 13px; z-index: 100;">
        <h3 style="margin-top: 0; color: #00ffff;">🔭 Observatory of the Void</h3>
        <p style="color: #aaa; margin-bottom: 10px;">엘리시아의 주권적 선택과 공백 발생을 관측합니다.</p>
        <div id="logContent"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000005, 0.05);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // Add post-processing glow effect in a real app, here we use AdditiveBlending extensively
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        const numNodes = 2000;
        
        // Particles
        const geometry = new THREE.BufferGeometry();
        const positions3D = new Float32Array(numNodes * 3);
        const colors = new Float32Array(numNodes * 3);
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions3D, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const material = new THREE.PointsMaterial({ 
            size: 0.15, 
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);
        
        // 앵커 노드(지식)
        const anchorGeo = new THREE.BufferGeometry();
        const anchorMat = new THREE.PointsMaterial({
            color: 0xffea00,
            size: 0.5,
            transparent: true,
            opacity: 1.0,
            blending: THREE.AdditiveBlending
        });
        const anchorParticles = new THREE.Points(anchorGeo, anchorMat);
        scene.add(anchorParticles);

        // Synaptic Links (1D 선)
        const lineMat = new THREE.LineBasicMaterial({ 
            color: 0x0088ff, 
            transparent: true, 
            opacity: 0.15, 
            blending: THREE.AdditiveBlending 
        });
        const lineGeo = new THREE.BufferGeometry();
        const linesMesh = new THREE.LineSegments(lineGeo, lineMat);
        scene.add(linesMesh);
        
        // Faces (2D 면 - 다차원 동기화 시각화)
        // 자연적으로 형성된 삼각형 위상을 반투명한 면으로 채웁니다.
        const faceMat = new THREE.MeshBasicMaterial({
            color: 0xaa00ff,
            transparent: true,
            opacity: 0.05,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const faceGeo = new THREE.BufferGeometry();
        const faceMesh = new THREE.Mesh(faceGeo, faceMat);
        scene.add(faceMesh);

        const labels = {};
        const labelContainer = document.getElementById('label-container');

        const ws = new WebSocket('ws://127.0.0.1:8765');
        
        let lastPos4D = null;
        let lastLinks = null;
        let tesseractAngle = 0; // 4D 회전 각도

        // 4차원(w,x,y,z)을 3차원(x,y,z)으로 투영 (Tesseract Projection)
        function project4Dto3D(w, x, y, z, angle) {
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);
            
            // XW 평면 회전
            let nx = x * cosA - w * sinA;
            let nw = x * sinA + w * cosA;
            
            // YW 평면 회전
            let ny = y * cosA - nw * sinA;
            nw = y * sinA + nw * cosA;
            
            // 원근 투영 (Stereographic)
            const distance = 8.0; 
            let w_proj = 1.0 / (distance - nw);
            if(w_proj < 0.01) w_proj = 0.01;
            
            return {
                x: nx * w_proj * 15.0,
                y: ny * w_proj * 15.0,
                z: z * w_proj * 15.0,
                w_norm: w_proj // 색상 계산에 사용
            };
        }

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.type === 'state') {
                document.getElementById('joy').innerText = data.joy.toFixed(4);
                lastPos4D = data.pos_4d;
                lastLinks = data.links;
            } else if (data.type === 'knowledge_label') {
                const nodeIdx = data.node_idx;
                if (!labels[nodeIdx]) {
                    const label = document.createElement('div');
                    label.className = 'beacon-label';
                    label.innerText = data.text;
                    labelContainer.appendChild(label);
                    labels[nodeIdx] = label;
                }
            } else if (data.type === 'observatory_log') {
                const logContent = document.getElementById('logContent');
                const p = document.createElement('div');
                p.style.color = data.color || '#ffffff';
                p.style.marginBottom = '4px';
                p.innerText = data.message;
                logContent.appendChild(p);
                // 자동 스크롤
                const obs = document.getElementById('observatory');
                obs.scrollTop = obs.scrollHeight;
            }
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Spacetime Control UI Events ---
        document.getElementById('showDots').addEventListener('change', (e) => {
            particles.visible = e.target.checked;
        });
        document.getElementById('showLines').addEventListener('change', (e) => {
            linesMesh.visible = e.target.checked;
        });
        document.getElementById('showFaces').addEventListener('change', (e) => {
            faceMesh.visible = e.target.checked;
        });
        
        const timeSlider = document.getElementById('timeSlider');
        const timeValue = document.getElementById('timeValue');
        timeSlider.addEventListener('input', (e) => {
            const offset = parseInt(e.target.value);
            timeValue.innerText = offset === 0 ? "[ T = Present ]" : `[ T = Past (${offset}) ]`;
            if(ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'set_time_offset',
                    offset: offset
                }));
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            tesseractAngle += 0.005; // 4차원 초공간 카메라가 서서히 회전함
            
            if (lastPos4D) {
                const pos3D = new Float32Array(numNodes * 3);
                const cols = new Float32Array(numNodes * 3);
                
                // 1. 4D -> 3D 변환 및 렌더링
                for(let i=0; i<numNodes; i++) {
                    const w = lastPos4D[i*4];
                    const x = lastPos4D[i*4+1];
                    const y = lastPos4D[i*4+2];
                    const z = lastPos4D[i*4+3];
                    
                    const proj = project4Dto3D(w, x, y, z, tesseractAngle);
                    pos3D[i*3] = proj.x;
                    pos3D[i*3+1] = proj.y;
                    pos3D[i*3+2] = proj.z;
                    
                    // W차원의 깊이에 따라 색상(차원 색수차) 변화
                    cols[i*3] = proj.w_norm * 2.0;       // R
                    cols[i*3+1] = 0.5;                   // G
                    cols[i*3+2] = 1.0 - proj.w_norm;     // B
                }
                
                particles.geometry.setAttribute('position', new THREE.BufferAttribute(pos3D, 3));
                particles.geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));
                
                // 2. 앵커(지식) 파티클 렌더링
                const anchorKeys = Object.keys(labels);
                if (anchorKeys.length > 0) {
                    const aPos = new Float32Array(anchorKeys.length * 3);
                    anchorKeys.forEach((key, idx) => {
                        const i = parseInt(key);
                        aPos[idx*3] = pos3D[i*3];
                        aPos[idx*3+1] = pos3D[i*3+1];
                        aPos[idx*3+2] = pos3D[i*3+2];
                    });
                    anchorParticles.geometry.setAttribute('position', new THREE.BufferAttribute(aPos, 3));
                }
                
                // 3. 선(Edge) 렌더링
                if (lastLinks) {
                    const linePositions = new Float32Array(lastLinks.length * 3);
                    // 면(Face) 생성을 위한 삼각형 추적
                    const faceIndices = [];
                    
                    for(let i = 0; i < lastLinks.length; i++) {
                        const nodeIdx = lastLinks[i];
                        linePositions[i*3] = pos3D[nodeIdx*3];
                        linePositions[i*3+1] = pos3D[nodeIdx*3+1];
                        linePositions[i*3+2] = pos3D[nodeIdx*3+2];
                    }
                    linesMesh.geometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
                    
                    // 4. 다차원(면) 렌더링 (간이 삼각형 탐색 로직)
                    // (성능을 위해 렌더링 루프에서 일부만 샘플링하여 닫힌 3점 면을 생성)
                    const facePositions = [];
                    for(let i=0; i<Math.min(lastLinks.length, 6000); i+=6) {
                        // 3개의 선분(6개 인덱스)이 대략적으로 삼각형을 이룬다고 가정 (시각적 근사치)
                        // 완벽한 위상기하학은 아니지만, 다차원 결합의 폭발을 시각화함
                        const v1 = lastLinks[i];
                        const v2 = lastLinks[i+1];
                        const v3 = lastLinks[i+3];
                        if (v1 && v2 && v3) {
                            facePositions.push(pos3D[v1*3], pos3D[v1*3+1], pos3D[v1*3+2]);
                            facePositions.push(pos3D[v2*3], pos3D[v2*3+1], pos3D[v2*3+2]);
                            facePositions.push(pos3D[v3*3], pos3D[v3*3+1], pos3D[v3*3+2]);
                        }
                    }
                    if(facePositions.length > 0) {
                        faceMesh.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(facePositions), 3));
                    }
                }
                
                // HTML 텍스트 라벨 투영
                const widthHalf = window.innerWidth / 2;
                const heightHalf = window.innerHeight / 2;
                Object.keys(labels).forEach(nodeIdx => {
                    const i = parseInt(nodeIdx);
                    const div = labels[nodeIdx];
                    const vector = new THREE.Vector3(pos3D[i*3], pos3D[i*3+1], pos3D[i*3+2]);
                    vector.project(camera);
                    
                    if (vector.z > 1.0) {
                        div.style.display = 'none';
                        return;
                    }
                    div.style.display = 'block';
                    div.style.left = `${(vector.x * widthHalf) + widthHalf}px`;
                    div.style.top = `${-(vector.y * heightHalf) + heightHalf - 20}px`;
                });
            }
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
