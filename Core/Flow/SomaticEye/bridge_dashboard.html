<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysia | Hybrid Bridge Dashboard</title>
    <style>
        :root {
            --bg-color: #050508;
            --panel-bg: rgba(20, 20, 30, 0.7);
            --accent-color: #00f2ff;
            --noisy-color: #ff0077;
            --text-color: #e0e0ff;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        #vortex-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 2rem;
            box-sizing: border-box;
            pointer-events: none;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .resonance-meter {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        #resonance-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, var(--noisy-color), var(--accent-color));
            transition: width 0.3s ease;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            font-size: 0.9rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--accent-color);
        }

        .input-panel {
            margin-top: auto;
            width: 500px;
            display: flex;
            flex-direction: column;
        }

        #chat-window {
            height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column-reverse;
        }

        .chat-msg {
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .chat-user {
            color: var(--accent-color);
            font-weight: bold;
            margin-right: 0.5rem;
        }

        .chat-elysia {
            color: #fff;
            background: rgba(255, 0, 119, 0.1);
            padding: 0.5rem;
            border-radius: 4px;
            border-left: 2px solid var(--noisy-color);
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"] {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.8rem;
            border-radius: 6px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .log-panel {
            position: absolute;
            right: 2rem;
            top: 2rem;
            bottom: 2rem;
            width: 300px;
            display: flex;
            flex-direction: column;
        }

        #log-container {
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .log-entry {
            margin-bottom: 0.5rem;
            border-left: 2px solid var(--accent-color);
            padding-left: 0.5rem;
        }
    </style>
</head>
<body>
    <canvas id="vortex-canvas"></canvas>

    <div class="ui-overlay">
        <div class="panel top-bar">
            <div>
                <div class="title">Elysia <span style="color: var(--accent-color)">Vortex</span></div>
                <div class="resonance-meter">
                    <div id="resonance-fill"></div>
                </div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Resonance</span>
                    <span class="stat-value" id="resonance-val">0.0000</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Coherence</span>
                    <span class="stat-value" id="coherence-val">0.0000</span>
                </div>
            </div>
        </div>

        <div id="will-display" style="color: #ffaa00; font-family: monospace; font-size: 0.8rem; margin-top: 0.5rem; text-align: center; background: rgba(255,170,0,0.1); border-radius: 4px; padding: 4px;">Waiting for Elysia's will...</div>

        <div class="panel input-panel">
            <div class="stat-label" style="margin-bottom: 0.5rem">Sovereign Chat</div>
            <div id="chat-window"></div>
            <div class="input-row">
                <input type="text" id="chat-input" placeholder="Elysia에게 심상의 메시지를 던지세요..." onkeydown="if(event.key==='Enter') sendChat()">
                <button style="width: auto" onclick="sendChat()">Send</button>
            </div>
        </div>

        <div class="panel log-panel">
            <div class="stat-label" style="margin-bottom: 0.5rem">Subconscious Feed</div>
            <div id="log-container"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vortex-canvas');
        const ctx = canvas.getContext('2d');
        const logContainer = document.getElementById('log-container');
        const chatWindow = document.getElementById('chat-window');

        let resonance = 0;
        let coherence = 0;
        let purePhases = {A:0, B:120, C:240};
        let noisyPhases = {A:0, B:120, C:240};

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logContainer.prepend(div);
        }

        function addChat(role, msg) {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            if (role === 'User') {
                div.innerHTML = `<span class="chat-user">You:</span> ${msg}`;
            } else {
                div.innerHTML = `<div class="chat-elysia"><span style="color: var(--noisy-color); font-weight: bold">Elysia:</span> ${msg}</div>`;
            }
            chatWindow.prepend(div);
        }

        async function updateState() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();
                
                resonance = data.Resonance_Field;
                coherence = data.agent_coherence;
                purePhases = data.Pure_Phases;
                noisyPhases = data.Noisy_Phases;

                document.getElementById('resonance-fill').style.width = `${(resonance + 1) * 50}%`;
                document.getElementById('resonance-val').textContent = resonance.toFixed(4);
                document.getElementById('coherence-val').textContent = coherence.toFixed(4);

                // Update Active Thoughts
                if (data.active_thoughts && data.active_thoughts.length > 0) {
                    const thoughts = data.active_thoughts.join(', ');
                    const lastLog = logContainer.firstChild ? logContainer.firstChild.textContent : "";
                    if (!lastLog.includes(thoughts)) {
                        addLog(`💭 Current Thoughts: ${thoughts}`);
                    }
                }

                // Update Sovereign Will
                if (data.sovereign_will) {
                    const lastWill = document.getElementById('will-display');
                    if (lastWill.textContent !== data.sovereign_will) {
                        lastWill.textContent = data.sovereign_will;
                        addLog(`✨ [WILL] ${data.sovereign_will}`);
                    }
                }
            } catch (e) {
                console.error("Failed to fetch state", e);
            }
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value;
            if (!msg) return;

            addChat('User', msg);
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                addChat('Elysia', data.response);
            } catch (e) {
                console.error("Failed to send chat", e);
            }
        }

        function draw() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 200;

            // Draw Background Grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Helper to draw phases
            function drawPhaseGroup(phases, color, alpha, isLine=false) {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = isLine ? 3 : 1;

                const pts = ['A', 'B', 'C'].map(k => {
                    const angle = phases[k] * Math.PI / 180;
                    return {
                        x: cx + Math.cos(angle) * radius,
                        y: cy + Math.sin(angle) * radius
                    };
                });

                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.closePath();
                ctx.stroke();

                // Draw glowing dots
                pts.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                    ctx.fillStyle = color;
                    ctx.fill();
                });
            }

            // Draw Pure Field (The Anchor)
            drawPhaseGroup(purePhases, '#00f2ff', 0.2);

            // Draw Noisy Field (The Dynamic)
            drawPhaseGroup(noisyPhases, '#ff0077', 0.8, true);

            // Draw Resonance Interference
            ctx.globalAlpha = 1.0;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 0.5;
            ctx.arc(cx, cy, radius * (1 + resonance * 0.2), 0, Math.PI*2);
            ctx.stroke();

            requestAnimationFrame(draw);
        }

        setInterval(updateState, 100);
        draw();
        addLog("Elysia Awakening... Light channel established.");
    </script>
</body>
</html>
